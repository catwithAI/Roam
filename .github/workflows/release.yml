name: release

# Build and publish prebuilt artifacts so `curl | bash` installs can download them:
#   - roam-<os>-<arch>   单一自包含二进制（内嵌前端 + ttmux CLI），下载即用
#   - ttmux-<os>-<arch>  独立 CLI 二进制（install.sh 源码构建失败时的回退）
#   - chrome             chrome-cli（架构无关）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/ttmux-cli-go/go.mod
          cache-dependency-path: cli/ttmux-cli-go/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build ttmux CLI binaries (CGO off, all targets)
        working-directory: cli/ttmux-cli-go
        run: |
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 freebsd/amd64; do
            os=${t%/*}; arch=${t#*/}
            echo "building ttmux-$os-$arch"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -o "dist/ttmux-$os-$arch" ./cmd/ttmux-cli-go
          done

      - name: Build frontend once (reused by all roam targets)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build roam single binaries (frontend + ttmux embedded)
        env:
          ROAM_BUILD_VERSION: ${{ github.ref_name }}
        run: |
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os=${t%/*}; arch=${t#*/}
            echo "building roam-$os-$arch ($ROAM_BUILD_VERSION)"
            SKIP_FRONTEND=1 GOOS=$os GOARCH=$arch bash scripts/build/build-roam.sh
          done

      - name: Build chrome (bash, arch-independent)
        run: bash cli/chrome-cli/build.sh cli/ttmux-cli-go/dist/chrome

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            backend/dist/roam-*
            cli/ttmux-cli-go/dist/*
          fail_on_unmatched_files: true
          # tag 里带连字符（如 v0.1.0-rc.1）视为 prerelease
          prerelease: ${{ contains(github.ref_name, '-') }}
          # 自动生成 release 说明（依据自上个 tag 以来的合并 PR / 提交）
          generate_release_notes: true
